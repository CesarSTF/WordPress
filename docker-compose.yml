services:
  db:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: wp_db
      MARIADB_USER: wp_user
      MARIADB_PASSWORD: wp_pass
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_NAME: wp_db
      DB_USER: wp_user
      DB_PASSWORD: wp_pass
      DB_HOST: db
    depends_on:
      - db
    volumes:
      - wp_content:/var/www/html/wp-content

volumes:
  db_data:
  wp_content:
